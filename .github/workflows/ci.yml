name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  platform:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - typecheck
          - test
          - test:isolation
          - build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  pack-tests:
    name: pack-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate manifests
        run: pnpm packs:validate

      - name: Pack schema and regression tests
        run: pnpm packs:test && pnpm packs:smoke && pnpm packs:regression

  workflow-suite:
    name: workflow-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workflow lint without warnings
        run: pnpm lint:workflows

      - name: Workflow tests and coverage gate
        run: pnpm test:workflows

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - platform
      - pack-tests
      - workflow-suite
    steps:
      - name: Done
        run: echo "All required checks passed."
