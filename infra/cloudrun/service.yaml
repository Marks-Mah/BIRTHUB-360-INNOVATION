apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: birthub-api-gateway
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/birthub-api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: node-env
                  key: latest
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: port
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
            - name: ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-url
                  key: latest
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-url
                  key: latest
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-anon-key
                  key: latest
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-service-role-key
                  key: latest
            - name: SUPABASE_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-issuer
                  key: latest
            - name: SUPABASE_JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-audience
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: internal-service-token
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resend-api-key
                  key: latest
            - name: SVIX_APP_ID
              valueFrom:
                secretKeyRef:
                  name: svix-app-id
                  key: latest
            - name: SVIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: svix-api-key
                  key: latest
            - name: SVIX_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: svix-webhook-secret
                  key: latest
            - name: META_WABA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: meta-waba-token
                  key: latest
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret-key
                  key: latest
            - name: PAGARME_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pagarme-api-key
                  key: latest
            - name: ASAAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: asaas-api-key
                  key: latest
            - name: CLICKSIGN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clicksign-api-key
                  key: latest
            - name: DOCUSIGN_INTEGRATION_KEY
              valueFrom:
                secretKeyRef:
                  name: docusign-integration-key
                  key: latest
            - name: FOCUS_NFE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: focus-nfe-token
                  key: latest
            - name: GOOGLE_CALENDAR_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: google-calendar-credentials-json
                  key: latest
            - name: GOOGLE_CALENDAR_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: google-calendar-access-token
                  key: latest
            - name: HUBSPOT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hubspot-access-token
                  key: latest
            - name: PIPEDRIVE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipedrive-api-token
                  key: latest
            - name: GOOGLE_DRIVE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: google-drive-credentials-json
                  key: latest
            - name: GCS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: gcs-bucket
                  key: latest
            - name: GCS_REGION
              valueFrom:
                secretKeyRef:
                  name: gcs-region
                  key: latest
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: google-cloud-project
                  key: latest
            - name: GOOGLE_APPLICATION_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: google-application-credentials-json
                  key: latest
            - name: GRAFANA_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-url
                  key: latest
            - name: PROMETHEUS_URL
              valueFrom:
                secretKeyRef:
                  name: prometheus-url
                  key: latest
